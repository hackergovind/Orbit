name: Antigravity Protocol CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew test

    - name: Run Conformance Suite
      run: ./gradlew :production:conformance:run

    - name: Run Fuzz Tests
      run: ./gradlew :production:fuzzing:run

    - name: Run Automated Benchmarks
      run: ./gradlew :production:benchmark:run

    - name: Upload Test Reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-reports
        path: '**/build/reports/tests/'
